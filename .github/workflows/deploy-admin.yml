# Deploy SPA Vite (dist) → Hostinger via FTP.
# Repositório: só o admin na raiz (sem pasta hidrus-frontend-admin).
#
# Secrets / vars (DOIS tipos — não trocar):
#   HOSTINGER_FTP_HOST = só servidor FTP (IP ou hostname). Ex.: 147.93.14.87
#   vars  HOSTINGER_FTP_REMOTE_PATH_ADMIN_DEV  — pasta FTP para branch develop
#   vars  HOSTINGER_FTP_REMOTE_PATH_ADMIN_PRD  — pasta FTP para branch main
#   Colar "domains/.../admin" no HOST causa ENOTFOUND — isso não é um endereço DNS.
#
#   Também: HOSTINGER_FTP_USERNAME, HOSTINGER_FTP_PASSWORD
#     Hostinger: o site do domínio fica em domains/SEUDOMINIO.com/public_html/
#     NÃO uses só "public_html/admin" na pasta remota — a partir de ~ duplica ~/public_html/...
#   vars  VITE_API_URL_DEV  — URL da API no build da branch develop
#   vars  VITE_API_URL_PRD  — URL da API no build da branch main
#   secret VITE_BASE_URL (opcional) = base do site se não for a raiz; ex: /admin
# Host: só IP ou hostname (sem ftp://). ENOTFOUND = valor inválido (ex.: colou ftp://147... ou caminho de pasta no host).
#
# Diagnóstico "o log diz sucesso mas não vejo ficheiros":
#   O deploy foi para a pasta = var HOSTINGER_FTP_REMOTE_PATH_ADMIN_DEV ou _PRD (relativa ao FTP).
#   No gestor da Hostinger procura ".ftp-deploy-sync-state.json" — está na MESMA pasta que o index.html enviado.
#   Se o site é subdomínio (admin.dominio.com), o docroot pode ser domains/admin.dominio.com/public_html
#   e NÃO public_html/admin do domínio principal.
# dangerous-clean-slate: true apaga TUDO nessa pasta remota antes do upload — confirme o caminho antes de ativar.

name: Deploy Admin (Vite)

on:
  push:
    branches: [develop, main]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: deploy-admin
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secrets FTP obrigatórios
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ]; then
            echo "::error::Secrets: HOSTINGER_FTP_HOST, HOSTINGER_FTP_USERNAME, HOSTINGER_FTP_PASSWORD."
            exit 1
          fi
          if [[ "$FTP_HOST" == *"://"* ]]; then
            echo "::error::HOSTINGER_FTP_HOST não pode conter ftp:// ou http(s)://. Use só o IP (ex.: 147.93.14.87)."
            exit 1
          fi
          if [[ "$FTP_HOST" == *"/"* ]]; then
            echo "::error::HOSTINGER_FTP_HOST não pode ser um caminho. 'domains/.../admin' vai nas vars HOSTINGER_FTP_REMOTE_PATH_ADMIN_DEV / _PRD."
            exit 1
          fi

      # main → PRD; develop (e outras) → DEV
      - name: Pasta remota FTP por branch
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            T="${{ vars.HOSTINGER_FTP_REMOTE_PATH_ADMIN_PRD }}"
            N="HOSTINGER_FTP_REMOTE_PATH_ADMIN_PRD"
          else
            T="${{ vars.HOSTINGER_FTP_REMOTE_PATH_ADMIN_DEV }}"
            N="HOSTINGER_FTP_REMOTE_PATH_ADMIN_DEV"
          fi
          if [ -z "$T" ]; then
            echo "::error::Defina a var $N (branch: ${GITHUB_REF_NAME})."
            exit 1
          fi
          T=$(printf '%s' "$T" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          echo "HOSTINGER_FTP_REMOTE_PATH=$T" >> "$GITHUB_ENV"
          echo "FTP → $T (${GITHUB_REF_NAME})"

      - name: VITE_API_URL por branch
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            T="${{ vars.VITE_API_URL_PRD }}"
            N="VITE_API_URL_PRD"
          else
            T="${{ vars.VITE_API_URL_DEV }}"
            N="VITE_API_URL_DEV"
          fi
          if [ -z "$T" ]; then
            echo "::error::Defina a var $N (branch: ${GITHUB_REF_NAME})."
            exit 1
          fi
          T=$(printf '%s' "$T" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          D=_VITE_API_URL_VAL_
          {
            echo "VITE_API_URL<<$D"
            printf '%s\n' "$T"
            echo "$D"
          } >> "$GITHUB_ENV"
          echo "VITE_API_URL ok (${GITHUB_REF_NAME})"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install & build
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy dist via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          port: ${{ secrets.HOSTINGER_FTP_PORT != '' && secrets.HOSTINGER_FTP_PORT || 21 }}
          protocol: ftps
          security: loose
          timeout: 300000
          local-dir: ./dist/
          server-dir: ${{ env.HOSTINGER_FTP_REMOTE_PATH }}/
          dangerous-clean-slate: true
