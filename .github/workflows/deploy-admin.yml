# Deploy SPA Vite (dist) → Hostinger via FTP.
# Repositório: só o admin na raiz (sem pasta hidrus-frontend-admin).
#
# Secrets: HOSTINGER_FTP_*, HOSTINGER_FTP_REMOTE_PATH_ADMIN, VITE_API_URL
# Host: só IP ou hostname (sem ftp://)

name: Deploy Admin (Vite)

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: deploy-admin
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install & build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy dist via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          port: ${{ secrets.HOSTINGER_FTP_PORT != '' && secrets.HOSTINGER_FTP_PORT || 21 }}
          protocol: ftps
          security: loose
          timeout: 300000
          local-dir: ./dist/
          server-dir: ${{ secrets.HOSTINGER_FTP_REMOTE_PATH_ADMIN }}/
          dangerous-clean-slate: true
