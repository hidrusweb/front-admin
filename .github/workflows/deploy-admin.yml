# Deploy SPA Vite (dist) → Hostinger via FTP.
# Repositório: só o admin na raiz (sem pasta hidrus-frontend-admin).
#
# Secrets (criar NESTE repositório — não são herdados do repo backend):
#   HOSTINGER_FTP_HOST, HOSTINGER_FTP_USERNAME, HOSTINGER_FTP_PASSWORD
#   HOSTINGER_FTP_REMOTE_PATH_ADMIN = pasta EXATA no FTP (ver FileZilla após login).
#     Se quiseres ficheiros em .../public_html/admin/ → secret = public_html/admin (não só public_html).
#   VITE_API_URL
#   VITE_BASE_URL (opcional) = base do site se não for a raiz; ex: /admin (obrigatório se a URL for https://dominio.com/admin/)
# Host: só IP ou hostname (sem ftp://)

name: Deploy Admin (Vite)

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: deploy-admin
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secrets FTP obrigatórios
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          FTP_REMOTE: ${{ secrets.HOSTINGER_FTP_REMOTE_PATH_ADMIN }}/
        run: |
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ] || [ -z "$FTP_REMOTE" ]; then
            echo "::error::Crie em Settings → Secrets → Actions: HOSTINGER_FTP_HOST, HOSTINGER_FTP_USERNAME, HOSTINGER_FTP_PASSWORD, HOSTINGER_FTP_REMOTE_PATH_ADMIN (ex: public_html/admin). Cada repositório tem os seus secrets."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install & build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy dist via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          port: ${{ secrets.HOSTINGER_FTP_PORT != '' && secrets.HOSTINGER_FTP_PORT || 21 }}
          protocol: ftps
          security: loose
          timeout: 300000
          local-dir: ./dist/
          server-dir: ${{ secrets.HOSTINGER_FTP_REMOTE_PATH_ADMIN }}/
          dangerous-clean-slate: true
